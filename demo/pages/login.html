<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – Ortheon Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 2rem; width: 360px; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #111; }
    label { display: block; font-size: .875rem; color: #444; margin-bottom: .25rem; }
    input { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: .5rem .75rem; font-size: 1rem; margin-bottom: 1rem; }
    input:focus { outline: 2px solid #4f46e5; border-color: transparent; }
    button { width: 100%; background: #4f46e5; color: #fff; border: none; border-radius: 6px; padding: .65rem; font-size: 1rem; cursor: pointer; }
    button:hover { background: #4338ca; }
    .error { color: #dc2626; font-size: .875rem; margin-top: .75rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" data-testid="email" autocomplete="email" required />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" data-testid="password" autocomplete="current-password" required />
      <button type="submit" data-testid="submit-login">Sign in</button>
      <div class="error" id="error-msg" style="display:none"></div>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        if (!res.ok) {
          const data = await res.json();
          errEl.textContent = data.error || 'Login failed';
          errEl.style.display = 'block';
          return;
        }
        const data = await res.json();
        // Store token in a visible DOM attribute for explicit extraction by specs
        document.body.setAttribute('data-token', data.token);
        document.body.setAttribute('data-testid', 'logged-in');
        window.location.href = '/products';
      } catch (err) {
        errEl.textContent = 'Network error';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
